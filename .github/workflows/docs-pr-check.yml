name: Link rendered docs in PR check

on:
  workflow_run:
    workflows: ["Build and deploy documentation"]
    types:
      - completed

# This workflow needs checks:write to create a check run on the PR's head SHA.
# Using workflow_run ensures this permission is granted even for PRs from forks,
# because this workflow always runs in the context of the base repository.
permissions:
  checks: write

jobs:
  create-docs-check:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.event == 'pull_request'
    steps:
      - name: Create check run pointing to the rendered docs artifact
        uses: actions/github-script@v7
        with:
          script: |
            const run = context.payload.workflow_run;

            // Find the docs artifact uploaded by the build workflow.
            const { data: { artifacts } } = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: run.id,
            });
            const docsArtifact = artifacts.find(a => a.name.startsWith('docs-html-pr-'));
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${run.id}`;
            const artifactUrl = docsArtifact
              ? `${runUrl}/artifacts/${docsArtifact.id}`
              : null;

            if (!artifactUrl) {
              // The check run is still created below, reporting neutral/failure as appropriate.
              core.warning(`No docs artifact found; the check run will reflect the build outcome. See ${runUrl}`);
            }

            const buildSucceeded = run.conclusion === 'success';
            // Distinguish between a failed build and a successful build with a missing artifact.
            const conclusion = !buildSucceeded ? 'failure'
              : artifactUrl ? 'success'
              : 'neutral';

            await github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: 'Check the rendered docs here!',
              head_sha: run.head_sha,
              status: 'completed',
              conclusion,
              details_url: artifactUrl ?? runUrl,
              output: {
                title: artifactUrl
                  ? 'Rendered docs are available'
                  : buildSucceeded
                    ? 'Rendered docs artifact not found despite successful build'
                    : 'Docs build failed',
                summary: artifactUrl
                  ? `The rendered documentation was built and uploaded as an artifact.\n\n[Download rendered docs](${artifactUrl})`
                  : `The docs build did not produce an artifact. Check the [workflow run](${runUrl}) for details.`,
              },
            });
